services:
  # --- NetBird VPN Sidecar ---
  netbird-sidecar:
    image: lyhcode/netbird-sidecar:latest
    container_name: netbird-sidecar
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/net/tun
    env_file: .env
    volumes:
      - netbird-config:/var/lib/netbird
    restart: unless-stopped

  # --- Example: route app traffic through VPN ---
  # Uncomment to test the sidecar pattern:
  #
  # my-app:
  #   image: curlimages/curl:latest
  #   network_mode: "service:netbird-sidecar"
  #   depends_on:
  #     netbird-sidecar:
  #       condition: service_healthy
  #   command: ["sh", "-c", "while true; do curl -s ifconfig.me && sleep 60; done"]

volumes:
  netbird-config:
